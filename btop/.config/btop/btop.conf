#? Config file for btop v. 1.4.7

# Color theme, looks for a .theme file in "../share/btop/themes" and "~/.config/btop/themes"
color_theme = "tokyo-night"

# If empty (transparent) background should be used. Lets kitty's opacity + blur show through.
theme_background = False

# Sets if 24-bit truecolor should be used.
truecolor = True

# Manually set which boxes to show. Network is covered by bandwhich, so keep btop to cpu/mem/proc.
shown_boxes = "cpu mem proc"

# Rounded corners on boxes, matches Hyprland's rounding.
rounded_corners = True

# Default symbols to use for graph creation, "braille", "block" or "tty".
graph_symbol = "braille"

# Use a minimal header bar.
show_uptime = True

# Update time in milliseconds.
update_ms = 1000

# Processes sorting.
proc_sorting = "cpu lazy"

# Show process memory as bytes instead of percent.
proc_mem_bytes = True

# Use the cpu graph as background to the process list.
proc_gradient = True

# Show cpu temperature.
check_temp = True

# Show cpu graph as a single graph spanning all cores.
cpu_single_graph = False

# Which temperature scale to use.
temp_scale = "celsius"

# Draw a clock at the top of the cpu box.
clock_format = "%X"

# Enable vim keys (h,j,k,l) in addition to arrows.
vim_keys = True
