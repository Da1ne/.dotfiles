general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid duplicate locks
    before_sleep_cmd = loginctl lock-session    # lock before suspend -> locked on wake
    after_sleep_cmd = hyprctl dispatch dpms on  # turn screen back on after wake
}

# Dim/lock after inactivity, then turn the screen off
listener {
    timeout = 300                               # 5 min: lock
    on-timeout = loginctl lock-session
}

listener {
    timeout = 330                               # 5.5 min: screen off
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Suspend after longer idle (optional - tune to taste)
listener {
    timeout = 1800                              # 30 min: suspend
    on-timeout = systemctl suspend
}
