


general {
    hide_cursor = true
}

background {
    monitor =
    color = rgba(15, 15, 20, 1.0)
    # or use your wallpaper:
    # path = ~/Pictures/wallpaper.png
    # blur_passes = 3
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.25
    outer_color = rgba(33ccffee)
    inner_color = rgba(25, 25, 35, 1.0)
    font_color = rgba(220, 220, 230, 1.0)
    placeholder_text = <i>Password...</i>
    fade_on_empty = true
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgba(220, 220, 230, 1.0)
    font_size = 64
    position = 0, 120
    halign = center
    valign = center
}
